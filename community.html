<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Community | OpenEnvision</title>
    <meta
      name="description"
      content="Explore BlogXiv, OpenEnvision's AI research blog discovery community."
    />
    <link rel="icon" type="image/png" href="assets/img/brand/openenvision_mark.png?v=tab-logo" />
    <link rel="shortcut icon" type="image/png" href="assets/img/brand/openenvision_mark.png?v=tab-logo" />
    <link rel="apple-touch-icon" href="assets/img/brand/openenvision_mark.png?v=tab-logo" />
    <link rel="stylesheet" href="assets/css/styles.css?v=visual-system-20260710-community-refined" />
  </head>
  <body class="community-page" data-page="community">
    <header class="site-header" data-header>
      <a class="brand" href="index.html" aria-label="OpenEnvision home">
        <img class="brand-logo" src="assets/img/brand/openenvision_mark.png" alt="OpenEnvision logo" />
        <span>OpenEnvision</span>
      </a>
      <button class="nav-toggle" type="button" aria-expanded="false" aria-label="Open navigation" data-nav-toggle>
        <span></span>
        <span></span>
      </button>
      <nav class="site-nav" aria-label="Primary navigation" data-nav>
        <a href="index.html" data-page-link="home">Home</a>
        <a href="team.html" data-page-link="team">Team</a>
        <a href="news.html" data-page-link="news">News</a>
        <a href="research.html" data-page-link="research">Research</a>
        <a href="publications.html" data-page-link="publications">Publications</a>
        <a href="code-datasets.html" data-page-link="code-datasets">Code | Datasets</a>
        <a href="community.html" data-page-link="community">Community</a>
        <a href="join-us.html" data-page-link="join">Join Us</a>
      </nav>
    </header>

    <main class="community-main">
      <section class="community-shell" aria-labelledby="community-title">
        <header class="community-toolbar">
          <div class="community-title-block">
            <h1 id="community-title">BlogXiv</h1>
            <p>AI Research Blog Discovery</p>
          </div>
          <a
            class="community-external-link"
            href="https://openenvision.github.io/BlogXiv/site/index.html"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Open BlogXiv in a new tab"
          >
            <span class="community-external-label">Open full page</span>
            <svg viewBox="0 0 20 20" aria-hidden="true">
              <path d="M8 4h8v8M16 4 8 12M15 11v5H4V5h5" />
            </svg>
          </a>
        </header>

        <div class="community-frame-wrap">
          <div class="community-frame-loading" aria-hidden="true">
            <span>BlogXiv</span>
            <span class="community-loading-track"><i></i></span>
          </div>
          <div class="community-mobile-launch" aria-label="BlogXiv mobile access">
            <div class="community-mobile-launch-inner">
              <img
                class="community-mobile-blogxiv-logo"
                src="https://openenvision.github.io/BlogXiv/site/assets/img/brand/blogxiv.svg"
                alt="BlogXiv"
                width="300"
                height="92"
              />
              <p>AI Research Blog Discovery</p>
              <a
                class="community-mobile-primary"
                href="https://openenvision.github.io/BlogXiv/site/index.html"
                target="_blank"
                rel="noopener noreferrer"
              >
                Open BlogXiv
                <svg viewBox="0 0 20 20" aria-hidden="true">
                  <path d="M8 4h8v8M16 4 8 12M15 11v5H4V5h5" />
                </svg>
              </a>
              <nav class="community-mobile-links" aria-label="BlogXiv sections">
                <a href="https://openenvision.github.io/BlogXiv/site/explore.html" target="_blank" rel="noopener noreferrer">Explore</a>
                <a href="https://openenvision.github.io/BlogXiv/site/bloggers.html" target="_blank" rel="noopener noreferrer">Bloggers</a>
                <a href="https://openenvision.github.io/BlogXiv/site/categories.html" target="_blank" rel="noopener noreferrer">Categories</a>
              </nav>
            </div>
          </div>
          <iframe
            class="community-frame"
            src="https://openenvision.github.io/BlogXiv/site/index.html"
            title="BlogXiv — AI Research Blog Discovery"
            loading="eager"
            referrerpolicy="strict-origin-when-cross-origin"
            onload="this.parentElement.classList.add('is-loaded')"
          >
            <p>
              BlogXiv could not be embedded.
              <a href="https://openenvision.github.io/BlogXiv/site/index.html">Open BlogXiv directly.</a>
            </p>
          </iframe>
        </div>
      </section>
    </main>

    <script src="assets/js/main.js?v=visual-system-20260710-community-refined"></script>
  </body>
</html>
